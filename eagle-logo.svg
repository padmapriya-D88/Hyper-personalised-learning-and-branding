<svg viewBox="0 0 500 310" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="50%" cy="42%" r="58%">
      <stop offset="0%"   stop-color="#fce060"/>
      <stop offset="28%"  stop-color="#e8a820"/>
      <stop offset="60%"  stop-color="#c07810"/>
      <stop offset="86%"  stop-color="#8a4e08"/>
      <stop offset="100%" stop-color="#5a3004"/>
    </radialGradient>
    <filter id="halo" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="glow" x="-22%" y="-22%" width="144%" height="144%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Amber halo glow -->
  <ellipse cx="250" cy="190" rx="225" ry="138" filter="url(#halo)" fill="#c07810" opacity="0.62"/>
  <ellipse cx="250" cy="178" rx="145" ry="92" filter="url(#halo)" fill="#e09018" opacity="0.34"/>

  <!-- Decorative crown above -->
  <g filter="url(#cglow)" fill="#e8a818" opacity="0.92">
    <polygon points="250,4 255,14 250,24 245,14"/>
    <circle cx="234" cy="14" r="2.5"/>
    <circle cx="266" cy="14" r="2.5"/>
    <rect x="218" y="13" width="13" height="1.6" rx="0.8"/>
    <rect x="269" y="13" width="13" height="1.6" rx="0.8"/>
  </g>

  <!-- ── EAGLE ── -->
  <g filter="url(#glow)">

    <!-- LEFT WING: shoulder → sweeps up-left to tip → feathered trailing edge → back -->
    <path fill="url(#g1)" d="
      M 215 192
      C 165 160, 88 108, 14 64
      Q -5 76, 17 100
      L 30 126  L 50 102
      L 70 120  L 90 98
      L 110 116  L 130 96
      L 150 114  L 168 98
      L 184 110  L 200 100
      C 210 108, 215 120, 215 132
      Z"/>

    <!-- RIGHT WING: mirror -->
    <path fill="url(#g1)" d="
      M 285 192
      C 335 160, 412 108, 486 64
      Q 505 76, 483 100
      L 470 126  L 450 102
      L 430 120  L 410 98
      L 390 116  L 370 96
      L 350 114  L 332 98
      L 316 110  L 300 100
      C 290 108, 285 120, 285 132
      Z"/>

    <!-- BODY / chest -->
    <path fill="url(#g1)" d="
      M 216 188
      C 216 170, 228 158, 250 155
      C 272 158, 284 170, 284 188
      C 284 224, 272 258, 260 272
      C 256 278, 244 278, 240 272
      C 228 258, 216 224, 216 188 Z"/>

    <!-- HEAD -->
    <circle cx="260" cy="140" r="27" fill="url(#g1)"/>

    <!-- BEAK (hooked, pointing right) -->
    <path fill="#9a5c06" d="M 278 144 C 302 155, 304 164, 280 170 C 292 162, 284 154, 278 144 Z"/>

    <!-- NECK connector (fills gap between head and body) -->
    <path fill="url(#g1)" d="M 238 154 C 238 156, 242 158, 250 158 C 258 158, 262 156, 262 154 C 262 148, 258 142, 250 140 C 242 142, 238 148, 238 154 Z" opacity="0.5"/>

    <!-- TAIL FEATHERS (7, fan below body) -->
    <path fill="url(#g1)" d="
      M 218 266
      C 213 274, 208 285, 204 298
      L 212 301  L 214 289
      L 220 300  L 226 300  L 227 288
      L 233 299  L 239 299  L 239 287
      L 245 299  L 251 299  L 251 287
      L 257 299  L 263 300  L 263 288
      L 269 300  L 275 300  L 275 289
      L 278 298
      C 276 285, 271 274, 282 266
      Z"/>

    <!-- Wing structure lines -->
    <g stroke="#7a4406" stroke-width="1.3" opacity="0.38" fill="none">
      <path d="M 215 190 C 188 168, 140 132, 88 106"/>
      <path d="M 215 190 C 196 174, 158 150, 132 134"/>
      <path d="M 215 190 C 208 182, 190 168, 174 158"/>
      <path d="M 285 190 C 312 168, 360 132, 412 106"/>
      <path d="M 285 190 C 304 174, 342 150, 368 134"/>
      <path d="M 285 190 C 292 182, 310 168, 326 158"/>
    </g>

    <!-- TALONS left -->
    <path fill="url(#g1)" d="M 230 270 L 220 284 L 226 287 L 230 278 L 235 287 L 241 287 L 243 278 L 248 286 L 251 282 L 244 270 Z"/>
    <!-- TALONS right -->
    <path fill="url(#g1)" d="M 270 270 L 260 284 L 266 287 L 270 278 L 275 287 L 281 287 L 283 278 L 288 286 L 291 282 L 284 270 Z"/>

  </g>

  <!-- Eye -->
  <circle cx="266" cy="134" r="6.5" fill="#140a00"/>
  <circle cx="268" cy="132" r="2.4" fill="#ffe090" opacity="0.92"/>
  <circle cx="266" cy="134" r="9"   fill="none" stroke="#d08010" stroke-width="1.3" opacity="0.52"/>

  <!-- Breast highlight sheen -->
  <ellipse cx="252" cy="208" rx="18" ry="30" fill="#fce060" opacity="0.055"/>
</svg>
